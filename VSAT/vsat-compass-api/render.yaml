# V-SAT Compass API — Render.com Deploy Configuration
# IMPORTANT: All secret values must be set in the Render Dashboard, NOT here.
# See docs/DEPLOY_RUNBOOK.md for setup instructions.
services:
  - type: web
    name: vsat-compass-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /api/v1/actuator/health
    envVars:
      # Database — set actual values in Render Dashboard
      - key: DATABASE_URL
        sync: false  # Set in Render Dashboard
      - key: DATABASE_USERNAME
        sync: false  # Set in Render Dashboard
      - key: DATABASE_PASSWORD
        sync: false  # Set in Render Dashboard
      # JWT — set in Render Dashboard. Generate with: openssl rand -base64 64
      - key: JWT_SECRET
        sync: false  # Set in Render Dashboard
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:5173,https://vsat-compass-api.onrender.com
